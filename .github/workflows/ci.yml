name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Pin npm version
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm install

      # Regenerate Sanity types from the schema, then fail if the committed
      # generated files (sanity.schema.json / sanity.types.ts) are out of date.
      # This guards against pushing stale generated types after a schema or GROQ
      # change — the class of failure that requires a local `npm run typegen`.
      - name: Verify Sanity types are up to date
        run: |
          npm run typegen
          if ! git diff --exit-code -- sanity.schema.json sanity.types.ts; then
            echo "::error::sanity.schema.json / sanity.types.ts are out of date. Run 'npm run typegen' and commit the result."
            exit 1
          fi
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'

      - name: TypeScript check
        run: npm run type-check
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'
          SANITY_WEBHOOK_SECRET: ${{ secrets.SANITY_WEBHOOK_SECRET }}

      - name: Security audit
        run: npm audit --audit-level=critical
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'

      - name: Notify Vercel of check status
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: CI
          github_token: ${{ secrets.GITHUB_TOKEN }}
