name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read
  statuses: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Pin npm version
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm install

      # Regenerate Sanity types from the schema, then fail if the committed
      # generated files (sanity.schema.json / sanity.types.ts) are out of date.
      # This guards against pushing stale generated types after a schema or GROQ
      # change — the class of failure that requires a local `npm run typegen`.
      - name: Verify Sanity types are up to date
        run: |
          npm run typegen
          if ! git diff --exit-code -- sanity.schema.json sanity.types.ts; then
            echo "::error::sanity.schema.json / sanity.types.ts are out of date. Run 'npm run typegen' and commit the result."
            exit 1
          fi
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: d205mlci
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'

      - name: TypeScript check
        run: npm run type-check
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: d205mlci
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'

      - name: Lint
        run: npm run lint

      - name: Validate environment contract
        run: npm run env:check:ci

      - name: Validate inline documentation
        run: npm run docs:check

      - name: Validate observability coverage
        run: npm run observability:check

      - name: Unit tests
        run: npm run test:coverage
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: d205mlci
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'
          SANITY_WEBHOOK_SECRET: ci-test-webhook-secret

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: 'true'
          NEXT_PUBLIC_SANITY_PROJECT_ID: d205mlci
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end journey coverage
        run: npm run test:e2e:coverage
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: d205mlci
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'

      - name: Security audit
        run: npm audit --audit-level=critical
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: d205mlci
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'

      - name: Notify Vercel of check status
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: CI
          github_token: ${{ secrets.GITHUB_TOKEN }}
