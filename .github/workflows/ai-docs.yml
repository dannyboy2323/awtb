name: AI Docs Maintenance

on:
  push:
    branches: [main]
    paths-ignore:
      # Don't trigger when docs themselves change — avoids feedback loops
      - "docs/**"
      - "**.md"
      - "package-lock.json"
      - "sanity.types.ts"
      - "sanity.schema.json"

jobs:
  update-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Run AI docs check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai-docs-check.mjs

      - name: Check for doc changes
        id: changes
        run: |
          if git diff --quiet docs/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Files changed:"
            git diff --name-only docs/
          fi

      - name: Open PR with doc updates
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: AI-suggested documentation updates"
          title: "docs: AI-suggested documentation updates"
          body: |
            ## AI Documentation Review

            Claude reviewed recent code changes pushed to `main` and detected
            documentation that may need updating.

            **Please review these changes carefully before merging.**

            Claude updates docs based on code diffs — it may occasionally
            suggest changes that aren't needed, or miss context. Human review
            is required before merging this PR.

            ---
            *Generated by the AI Docs Maintenance workflow*
          branch: docs/ai-maintenance-${{ github.sha }}
          labels: documentation
          delete-branch: true
